name: SignalPro Market Update



on:

workflow_dispatch:



jobs:

update-market:

runs-on: ubuntu-latest
 

steps:

  - uses: actions/checkout@v4



  - uses: actions/setup-node@v4

    with:

      node-version: 20



  - run: npm install



  - run: node marketUpdater.js

    env:

      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
 
